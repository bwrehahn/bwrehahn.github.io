<!DOCTYPE html>
<html>
<head>
  <title>Sales Dashboard</title>

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <!-- Excel Reader -->
  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      margin: 0;
      padding: 20px;
    }

    h1 {
      text-align: center;
      margin-bottom: 10px;
    }

    .upload {
      text-align: center;
      margin-bottom: 20px;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
      margin-bottom: 20px;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 12px;
      text-align: center;
      box-shadow: 0 4px 10px rgba(0,0,0,0.08);
    }

    .card h3 {
      margin: 0;
      color: #555;
    }

    .card p {
      font-size: 24px;
      margin-top: 10px;
      font-weight: bold;
    }

    .charts {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    canvas {
      background: white;
      padding: 15px;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.08);
    }

    @media (max-width: 800px) {
      .charts, .cards {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>

<h1>Sales Analytics Dashboard</h1>

<div class="upload">
  <input type="file" id="fileInput">
</div>

<div class="cards">
  <div class="card">
    <h3>Total Revenue</h3>
    <p id="totalRevenue">$0</p>
  </div>
  <div class="card">
    <h3>Total Orders</h3>
    <p id="totalOrders">0</p>
  </div>
  <div class="card">
    <h3>Top Product</h3>
    <p id="topProduct">-</p>
  </div>
</div>

<div class="charts">
  <canvas id="revenueChart"></canvas>
  <canvas id="productChart"></canvas>
  <canvas id="regionChart"></canvas>
</div>

<script>
document.getElementById('fileInput').addEventListener('change', handleFile);

let charts = [];

function handleFile(e) {
  const file = e.target.files[0];
  const reader = new FileReader();

  reader.onload = function(e) {
    const data = new Uint8Array(e.target.result);
    const workbook = XLSX.read(data, { type: 'array' });

    const sheet = workbook.Sheets[workbook.SheetNames[0]];
    const json = XLSX.utils.sheet_to_json(sheet);

    processData(json);
  };

  reader.readAsArrayBuffer(file);
}

function processData(data) {
  const revenueByDate = {};
  const revenueByProduct = {};
  const revenueByRegion = {};

  let totalRevenue = 0;

  data.forEach(row => {
    const revenue = Number(row.Revenue) || 0;

    totalRevenue += revenue;

    revenueByDate[row.Date] = (revenueByDate[row.Date] || 0) + revenue;
    revenueByProduct[row.Product] = (revenueByProduct[row.Product] || 0) + revenue;
    revenueByRegion[row.Region] = (revenueByRegion[row.Region] || 0) + revenue;
  });

  const topProduct = Object.keys(revenueByProduct).reduce((a, b) =>
    revenueByProduct[a] > revenueByProduct[b] ? a : b
  );

  document.getElementById("totalRevenue").innerText = "$" + totalRevenue.toLocaleString();
  document.getElementById("totalOrders").innerText = data.length;
  document.getElementById("topProduct").innerText = topProduct;

  createCharts(revenueByDate, revenueByProduct, revenueByRegion);
}

function createCharts(dateData, productData, regionData) {

  charts.forEach(chart => chart.destroy());
  charts = [];

  charts.push(new Chart(document.getElementById("revenueChart"), {
    type: 'line',
    data: {
      labels: Object.keys(dateData),
      datasets: [{
        label: 'Revenue Over Time',
        data: Object.values(dateData),
        borderWidth: 2
      }]
    }
  }));

  charts.push(new Chart(document.getElementById("productChart"), {
    type: 'bar',
    data: {
      labels: Object.keys(productData),
      datasets: [{
        label: 'Revenue by Product',
        data: Object.values(productData),
        borderWidth: 2
      }]
    }
  }));

  charts.push(new Chart(document.getElementById("regionChart"), {
    type: 'pie',
    data: {
      labels: Object.keys(regionData),
      datasets: [{
        label: 'Revenue by Region',
        data: Object.values(regionData),
        borderWidth: 1
      }]
    }
  }));
}
</script>

</body>
</html>
