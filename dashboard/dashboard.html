<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Sales Dashboard</title>

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <!-- Excel Reader -->
  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      margin: 0;
      padding: 20px;
    }

    h1 {
      text-align: center;
      margin-bottom: 10px;
    }

    .upload {
      text-align: center;
      margin-bottom: 20px;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
      margin-bottom: 20px;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 12px;
      text-align: center;
      box-shadow: 0 4px 10px rgba(0,0,0,0.08);
    }

    .card h3 {
      margin: 0;
      color: #555;
    }

    .card p {
      font-size: 22px;
      font-weight: bold;
      margin-top: 10px;
    }

    .charts {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
    }

    .chart-box {
      background: white;
      padding: 10px;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.08);
    }

    canvas {
      width: 100% !important;
      height: 240px !important;
    }

    @media (max-width: 1000px) {
      .charts {
        grid-template-columns: repeat(2, 1fr);
      }

      .cards {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>

<h1>Sales Analytics Dashboard</h1>

<div class="upload">
  <input type="file" id="fileInput">
</div>

<div class="cards">
  <div class="card">
    <h3>Total Revenue</h3>
    <p id="totalRevenue">$0</p>
  </div>

  <div class="card">
    <h3>Total Orders</h3>
    <p id="totalOrders">0</p>
  </div>

  <div class="card">
    <h3>Top Product</h3>
    <p id="topProduct">-</p>
  </div>
</div>

<div class="charts">
  <div class="chart-box"><canvas id="revenueChart"></canvas></div>
  <div class="chart-box"><canvas id="productChart"></canvas></div>
  <div class="chart-box"><canvas id="regionChart"></canvas></div>
  <div class="chart-box"><canvas id="ordersChart"></canvas></div>
  <div class="chart-box"><canvas id="avgChart"></canvas></div>
</div>

<script>
document.getElementById('fileInput').addEventListener('change', handleFile);

let charts = [];

function handleFile(e) {
  const file = e.target.files[0];
  const reader = new FileReader();

  reader.onload = function(e) {
    const data = new Uint8Array(e.target.result);
    const workbook = XLSX.read(data, { type: 'array' });

    const sheet = workbook.Sheets[workbook.SheetNames[0]];
    const json = XLSX.utils.sheet_to_json(sheet);

    processData(json);
  };

  reader.readAsArrayBuffer(file);
}

function processData(data) {
  const revenueByDate = {};
  const revenueByProduct = {};
  const revenueByRegion = {};
  const ordersByDate = {};

  let totalRevenue = 0;

  data.forEach(row => {
    const revenue = Number(row.Revenue) || 0;

    totalRevenue += revenue;

    revenueByDate[row.Date] = (revenueByDate[row.Date] || 0) + revenue;
    revenueByProduct[row.Product] = (revenueByProduct[row.Product] || 0) + revenue;
    revenueByRegion[row.Region] = (revenueByRegion[row.Region] || 0) + revenue;

    ordersByDate[row.Date] = (ordersByDate[row.Date] || 0) + 1;
  });

  const topProduct = Object.keys(revenueByProduct).reduce((a, b) =>
    revenueByProduct[a] > revenueByProduct[b] ? a : b
  );

  document.getElementById("totalRevenue").innerText = "$" + totalRevenue.toLocaleString();
  document.getElementById("totalOrders").innerText = data.length;
  document.getElementById("topProduct").innerText = topProduct;

  createCharts(revenueByDate, revenueByProduct, revenueByRegion, ordersByDate);
}

function createCharts(dateData, productData, regionData, ordersByDate) {

  charts.forEach(c => c.destroy());
  charts = [];

  // Revenue over time
  charts.push(new Chart(document.getElementById("revenueChart"), {
    type: 'line',
    data: {
      labels: Object.keys(dateData),
      datasets: [{
        label: 'Revenue Over Time',
        data: Object.values(dateData),
        borderWidth: 2
      }]
    }
  }));

  // Revenue by product
  charts.push(new Chart(document.getElementById("productChart"), {
    type: 'bar',
    data: {
      labels: Object.keys(productData),
      datasets: [{
        label: 'Revenue by Product',
        data: Object.values(productData),
        borderWidth: 2
      }]
    }
  }));

  // Revenue by region
  charts.push(new Chart(document.getElementById("regionChart"), {
    type: 'pie',
    data: {
      labels: Object.keys(regionData),
      datasets: [{
        label: 'Revenue by Region',
        data: Object.values(regionData),
        borderWidth: 1
      }]
    }
  }));

  // Orders per day
  charts.push(new Chart(document.getElementById("ordersChart"), {
    type: 'bar',
    data: {
      labels: Object.keys(ordersByDate),
      datasets: [{
        label: 'Orders per Day',
        data: Object.values(ordersByDate),
        borderWidth: 2
      }]
    }
  }));

  // Average revenue per order
  const avg = Object.keys(dateData).map(date =>
    dateData[date] / (ordersByDate[date] || 1)
  );

  charts.push(new Chart(document.getElementById("avgChart"), {
    type: 'line',
    data: {
      labels: Object.keys(dateData),
      datasets: [{
        label: 'Avg Revenue per Order',
        data: avg,
        borderWidth: 2
      }]
    }
  }));
}
</script>

</body>
</html>
