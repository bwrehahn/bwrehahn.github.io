<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Senior SaaS Dashboard (Clean Data Model)</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
:root{
  --bg:#0b1220;
  --card:#111c33;
  --text:#e5e7eb;
  --muted:#94a3b8;
}

body.light{
  --bg:#f4f6f8;
  --card:#fff;
  --text:#111;
  --muted:#555;
}

body{
  margin:0;
  font-family:Arial;
  background:var(--bg);
  color:var(--text);
}

.header{
  display:flex;
  justify-content:space-between;
  padding:15px;
  border-bottom:1px solid #1f2a44;
}

button{
  background:var(--card);
  color:var(--text);
  border:none;
  padding:6px 10px;
  border-radius:8px;
  cursor:pointer;
}

.kpis{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:10px;
  padding:15px;
}

.kpi{
  background:var(--card);
  padding:15px;
  border-radius:12px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:15px;
  padding:15px;
}

.box{
  background:var(--card);
  height:320px;
  border-radius:12px;
  padding:10px;
}

canvas{
  width:100%!important;
  height:100%!important;
}

table{
  width:calc(100% - 30px);
  margin:15px;
  background:var(--card);
  border-collapse:collapse;
}

td,th{
  padding:8px;
  border-bottom:1px solid #1f2a44;
}

th{color:var(--muted);}
</style>
</head>

<body>

<div class="header">
  <b>Senior SaaS Dashboard</b>
  <input type="file" id="file">
  <button onclick="toggleTheme()">Theme</button>
</div>

<div class="kpis">
  <div class="kpi"><b>Revenue</b><p id="rev">$0</p></div>
  <div class="kpi"><b>Orders</b><p id="ord">0</p></div>
  <div class="kpi"><b>Top Product</b><p id="top">-</p></div>
  <div class="kpi"><b>Avg</b><p id="avg">$0</p></div>
</div>

<div class="grid">
  <div class="box"><canvas id="c1"></canvas></div>
  <div class="box"><canvas id="c2"></canvas></div>
  <div class="box"><canvas id="c3"></canvas></div>
  <div class="box"><canvas id="c4"></canvas></div>
</div>

<table>
<thead>
<tr><th>Date</th><th>Product</th><th>Region</th><th>Revenue</th></tr>
</thead>
<tbody id="table"></tbody>
</table>

<script>

let raw=[];
let charts=[];

/* THEME */
function toggleTheme(){
  document.body.classList.toggle("light");
}

/* DATE FIX */
function fixDate(v){
  if(typeof v==="number"){
    const d=XLSX.SSF.parse_date_code(v);
    if(!d) return v;
    return `${d.y}-${String(d.m).padStart(2,'0')}-${String(d.d).padStart(2,'0')}`;
  }
  return v;
}

/* SAFE LABEL NORMALIZER (IMPORTANT FIX) */
function normalize(v, fallback){
  v = (v ?? "").toString().trim();

  if(!v || v.toLowerCase()==="undefined"){
    return fallback;
  }
  return v;
}

/* FILE LOAD */
document.getElementById("file").onchange=e=>{
  const reader=new FileReader();

  reader.onload=ev=>{
    const wb=XLSX.read(new Uint8Array(ev.target.result),{type:"array"});
    const sh=wb.Sheets[wb.SheetNames[0]];

    const json=XLSX.utils.sheet_to_json(sh,{
      defval:"",
      raw:false
    });

    raw=json.map(r=>{
      let o={Product:"",Region:"",Date:"",Revenue:0};

      Object.keys(r).forEach(k=>{
        let key=k.toLowerCase().trim();

        if(key.includes("product")) o.Product=r[k];
        if(key.includes("region")) o.Region=r[k];
        if(key.includes("date")) o.Date=fixDate(r[k]);
        if(key.includes("revenue")) o.Revenue=Number(r[k])||0;
      });

      return o;
    }).filter(r=>r.Date);

    render();
  };

  reader.readAsArrayBuffer(e.target.files[0]);
};

/* RENDER */
function render(){

  let rev=0,p={},r={},d={};

  raw.forEach(x=>{
    let v=Number(x.Revenue)||0;
    rev+=v;

    let product = normalize(x.Product,"Unassigned Product");
    let region  = normalize(x.Region,"Unassigned Region");
    let date    = normalize(x.Date,"Unknown Date");

    p[product]=(p[product]||0)+v;
    r[region]=(r[region]||0)+v;
    d[date]=(d[date]||0)+v;
  });

  let top=Object.keys(p).reduce((a,b)=>p[a]>p[b]?a:b,"-");

  document.getElementById("rev").innerText="$"+rev.toLocaleString();
  document.getElementById("ord").innerText=raw.length;
  document.getElementById("top").innerText=top;
  document.getElementById("avg").innerText="$"+(rev/(raw.length||1)).toFixed(2);

  renderTable();
  renderCharts(p,r,d);
}

/* TABLE */
function renderTable(){
  document.getElementById("table").innerHTML=
    raw.map(r=>`
      <tr>
        <td>${r.Date}</td>
        <td>${r.Product}</td>
        <td>${r.Region}</td>
        <td>${r.Revenue}</td>
      </tr>
    `).join("");
}

/* CHARTS */
function renderCharts(p,r,d){

  charts.forEach(c=>c.destroy());
  charts=[];

  const prod={labels:Object.keys(p),values:Object.values(p)};
  const reg={labels:Object.keys(r),values:Object.values(r)};
  const dat={labels:Object.keys(d),values:Object.values(d)};

  charts.push(new Chart(c1,{
    type:"bar",
    data:{labels:prod.labels,datasets:[{data:prod.values}]},
    options:{responsive:true,maintainAspectRatio:false}
  }));

  charts.push(new Chart(c2,{
    type:"pie",
    data:{labels:reg.labels,datasets:[{data:reg.values}]},
    options:{responsive:true,maintainAspectRatio:false}
  }));

  charts.push(new Chart(c3,{
    type:"line",
    data:{labels:dat.labels,datasets:[{data:dat.values}]},
    options:{responsive:true,maintainAspectRatio:false}
  }));

  charts.push(new Chart(c4,{
    type:"bar",
    data:{labels:dat.labels,datasets:[{data:dat.values}]},
    options:{responsive:true,maintainAspectRatio:false}
  }));
}

</script>

</body>
</html>
