<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Senior SaaS Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
:root{
  --bg:#0b1220;
  --card:#111c33;
  --text:#e5e7eb;
  --muted:#94a3b8;
  --green:#22c55e;
  --red:#ef4444;
}

body.light{
  --bg:#f4f6f8;
  --card:#ffffff;
  --text:#111;
  --muted:#555;
}

body{
  margin:0;
  font-family:Arial;
  background:var(--bg);
  color:var(--text);
}

.header{
  display:flex;
  justify-content:space-between;
  padding:15px;
  border-bottom:1px solid #1f2a44;
  align-items:center;
}

.actions{
  display:flex;
  gap:10px;
}

button{
  background:var(--card);
  color:var(--text);
  border:none;
  padding:6px 10px;
  border-radius:8px;
  cursor:pointer;
}

button:hover{
  opacity:.85;
}

/* FILTER BAR (NEW) */
.filterBar{
  display:flex;
  gap:8px;
  padding:10px 15px;
  flex-wrap:wrap;
  align-items:center;
}

.filterChip{
  background:var(--card);
  border:1px solid #2a3550;
  padding:6px 10px;
  border-radius:20px;
  font-size:12px;
  cursor:pointer;
}

.filterChip:hover{
  opacity:.8;
}

/* KPI */
.kpis{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:10px;
  padding:10px 15px 0;
}

.kpi{
  background:var(--card);
  padding:10px;
  border-radius:10px;
  font-size:14px;
}

.kpi span{
  font-weight:bold;
  margin-left:6px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:15px;
  padding:15px;
}

.box{
  background:var(--card);
  height:320px;
  border-radius:12px;
  padding:10px;
}

canvas{
  width:100%!important;
  height:100%!important;
}

table{
  width:calc(100% - 30px);
  margin:15px;
  background:var(--card);
  border-collapse:collapse;
  border-radius:12px;
  overflow:hidden;
}

th{
  text-align:left;
  padding:10px;
  color:var(--muted);
  font-weight:600;
}

td{
  text-align:left;
  padding:10px;
  opacity:0.9;
  border-bottom:1px solid #1f2a44;
}
</style>
</head>

<body>

<div class="header">
  <b>Senior SaaS Dashboard</b>

  <div class="actions">
    <input type="file" id="file">
    <button onclick="toggleTheme()">🌙 Theme</button>
    <button onclick="clearFilters()">Reset Filters</button>
    <button onclick="exportCSV()">Export CSV</button>
  </div>
</div>

<!-- FILTER BAR (NEW) -->
<div class="filterBar" id="filterBar">
  <span style="color:var(--muted);font-size:12px;">Active filters:</span>
</div>

<div class="kpis">
  <div class="kpi">Revenue <span id="kpiRevenue">-</span></div>
  <div class="kpi">Orders <span id="kpiOrders">-</span></div>
  <div class="kpi">Avg Order <span id="kpiAvg">-</span></div>
  <div class="kpi">Trend <span id="kpiTrend">-</span></div>
</div>

<div class="grid">
  <div class="box"><canvas id="c1"></canvas></div>
  <div class="box"><canvas id="c2"></canvas></div>
  <div class="box"><canvas id="c3"></canvas></div>
  <div class="box"><canvas id="c4"></canvas></div>
</div>

<table>
<thead>
<tr>
<th>Date</th><th>Product</th><th>Region</th><th>Revenue</th>
</tr>
</thead>
<tbody id="table"></tbody>
</table>

<script>

let raw=[];
let charts=[];

// supports MULTI FILTERS (NEW)
let activeFilters = [];

function toggleTheme(){
  document.body.classList.toggle("light");
}

/* DATE PARSE */
function parseExcelDate(v){

  if(v === null || v === undefined) return "";

  if(typeof v === "number"){
    const d = XLSX.SSF.parse_date_code(v);
    if(!d) return "";
    return `${String(d.m).padStart(2,'0')}/${String(d.d).padStart(2,'0')}/${d.y}`;
  }

  let s = String(v).trim();
  if(!s || s.toLowerCase()==="undefined") return "";

  const d = new Date(s);
  if(!isNaN(d.getTime())){
    const mm = String(d.getMonth()+1).padStart(2,'0');
    const dd = String(d.getDate()).padStart(2,'0');
    const yyyy = d.getFullYear();
    return `${mm}/${dd}/${yyyy}`;
  }

  return s;
}

/* FILTER UI */
function renderFilterBar(){
  const bar = document.getElementById("filterBar");

  const chips = activeFilters.map((f,i)=>`
    <div class="filterChip" onclick="removeFilter(${i})">
      ${f.field}: ${f.value} ✕
    </div>
  `).join("");

  bar.innerHTML = `
    <span style="color:var(--muted);font-size:12px;">Active filters:</span>
    ${chips || "<span style='color:var(--muted)'>None</span>"}
  `;
}

function removeFilter(index){
  activeFilters.splice(index,1);
  render();
}

function clearFilters(){
  activeFilters = [];
  render();
}

/* FILTER ENGINE */
function applyFilter(field, value){

  // toggle off same filter
  const existing = activeFilters.findIndex(f => f.field === field && f.value === value);

  if(existing !== -1){
    activeFilters.splice(existing,1);
  } else {
    activeFilters.push({field,value});
  }

  render();
}

/* APPLY FILTERS TO DATA */
function getFilteredData(){
  let data = raw;

  activeFilters.forEach(f=>{
    data = data.filter(r => r[f.field] === f.value);
  });

  return data;
}

/* TABLE */
function renderTable(data){
  document.getElementById('table').innerHTML =
    data.map(r=>`
      <tr>
        <td>${r.Date}</td>
        <td>${r.Product}</td>
        <td>${r.Region}</td>
        <td>${r.Revenue}</td>
      </tr>
    `).join('');
}

/* LOAD */
document.getElementById('file').onchange=e=>{
  const reader=new FileReader();

  reader.onload=ev=>{
    const wb=XLSX.read(new Uint8Array(ev.target.result),{type:'array'});
    const sh=wb.Sheets[wb.SheetNames[0]];

    raw=XLSX.utils.sheet_to_json(sh,{defval:""}).map(r=>({
      Date: parseExcelDate(r.Date),
      Product: r.Product,
      Region: r.Region,
      Revenue: Number(r.Revenue)||0
    }));

    render();
  };

  reader.readAsArrayBuffer(e.target.files[0]);
};

function render(){

  const data = getFilteredData();

  let p={},r={},d={};
  let totalRevenue=0;

  data.forEach(x=>{
    let v=x.Revenue||0;
    totalRevenue+=v;

    p[x.Product]=(p[x.Product]||0)+v;
    r[x.Region]=(r[x.Region]||0)+v;
    d[x.Date]=(d[x.Date]||0)+v;
  });

  const dates = Object.keys(d).sort((a,b)=>new Date(a)-new Date(b));
  const values = dates.map(k=>d[k]);

  let pct = 0;
  let arrow = "—";
  let color = "var(--muted)";

  if(values.length > 1){
    const prev = values[values.length-2];
    const curr = values[values.length-1];

    if(prev !== 0){
      pct = ((curr - prev) / prev) * 100;
      arrow = pct >= 0 ? "▲" : "▼";
      color = pct >= 0 ? "var(--green)" : "var(--red)";
    }
  }

  document.getElementById("kpiRevenue").innerText = "$" + totalRevenue.toLocaleString();
  document.getElementById("kpiOrders").innerText = data.length;
  document.getElementById("kpiAvg").innerText = "$" + (totalRevenue/(data.length||1)).toFixed(2);

  document.getElementById("kpiTrend").innerHTML =
    `<span style="color:${color}">
      ${arrow} ${pct.toFixed(2)}%
    </span>`;

  renderFilterBar();          // NEW
  renderTable(data);
  renderCharts(p,r,d);
}

function renderCharts(p,r,d){

  charts.forEach(c=>c.destroy());
  charts=[];

  const pLabels = Object.keys(p);
  const pValues = Object.values(p);

  const rLabels = Object.keys(r);
  const rValues = Object.values(r);

  const dLabels = Object.keys(d).sort((a,b)=>new Date(a)-new Date(b));
  const dValues = dLabels.map(k=>d[k]);

  const money = (v)=>"$" + Number(v).toLocaleString();

  charts.push(new Chart(c1,{
    type:'bar',
    data:{labels:pLabels,datasets:[{label:"Revenue",data:pValues}]},
    options:{
      responsive:true,
      maintainAspectRatio:false,
      plugins:{
        title:{display:true,text:"Revenue by Product"},
        tooltip:{
          callbacks:{
            label:(ctx)=> `Revenue: ${money(ctx.raw)}`
          }
        }
      },
      onClick:(evt,e)=>{
        if(!e.length) return;
        applyFilter("Product", pLabels[e[0].index]);
      }
    }
  }));

  charts.push(new Chart(c2,{
    type:'pie',
    data:{labels:rLabels,datasets:[{label:"Revenue",data:rValues}]},
    options:{
      responsive:true,
      maintainAspectRatio:false,
      plugins:{
        title:{display:true,text:"Revenue by Region"},
        tooltip:{
          callbacks:{
            label:(ctx)=> `${ctx.label}: ${money(ctx.raw)}`
          }
        }
      },
      onClick:(evt,e)=>{
        if(!e.length) return;
        applyFilter("Region", rLabels[e[0].index]);
      }
    }
  }));

  charts.push(new Chart(c3,{
    type:'line',
    data:{labels:dLabels,datasets:[{label:"Revenue",data:dValues}]},
    options:{
      responsive:true,
      maintainAspectRatio:false,
      plugins:{
        title:{display:true,text:"Revenue Over Time"},
        tooltip:{
          callbacks:{
            label:(ctx)=> `Revenue: ${money(ctx.raw)}`
          }
        }
      },
      onClick:(evt,e)=>{
        if(!e.length) return;
        applyFilter("Date", dLabels[e[0].index]);
      }
    }
  }));

  charts.push(new Chart(c4,{
    type:'bar',
    data:{labels:dLabels,datasets:[{label:"Revenue",data:dValues}]},
    options:{
      responsive:true,
      maintainAspectRatio:false,
      plugins:{
        title:{display:true,text:"Daily Revenue"},
        tooltip:{
          callbacks:{
            label:(ctx)=> `Revenue: ${money(ctx.raw)}`
          }
        }
      },
      onClick:(evt,e)=>{
        if(!e.length) return;
        applyFilter("Date", dLabels[e[0].index]);
      }
    }
  }));
}
function exportCSV(){
  let csv="Date,Product,Region,Revenue\n";
  raw.forEach(r=>{
    csv+=`${r.Date},${r.Product},${r.Region},${r.Revenue}\n`;
  });

  const blob=new Blob([csv],{type:"text/csv"});
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download="data.csv";
  a.click();
}

</script>

</body>
</html>
