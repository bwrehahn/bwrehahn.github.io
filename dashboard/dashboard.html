<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Enterprise SaaS Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
:root{
  --bg:#0b1220;
  --card:#111c33;
  --text:#e5e7eb;
  --muted:#94a3b8;
  --good:#22c55e;
  --bad:#ef4444;
}

body.light{
  --bg:#f4f6f8;
  --card:#ffffff;
  --text:#111;
  --muted:#555;
}

body{
  margin:0;
  font-family:Arial;
  background:var(--bg);
  color:var(--text);
}

.header{
  display:flex;
  justify-content:space-between;
  padding:15px;
  border-bottom:1px solid #1f2a44;
}

button{
  background:var(--card);
  color:var(--text);
  border:none;
  padding:6px 10px;
  border-radius:8px;
  cursor:pointer;
}

.kpis{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:10px;
  padding:15px;
}

.kpi{
  background:var(--card);
  padding:15px;
  border-radius:12px;
}

.kpi h4{
  margin:0;
  font-size:12px;
  color:var(--muted);
}

.kpi p{
  margin:6px 0 0;
  font-size:20px;
}

.trend{
  font-size:12px;
  margin-top:4px;
}

.good{color:var(--good);}
.bad{color:var(--bad);}

.grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:15px;
  padding:15px;
}

.box{
  background:var(--card);
  border-radius:12px;
  height:320px;
  padding:10px;
}

canvas{
  width:100%!important;
  height:100%!important;
}
</style>
</head>

<body>

<div class="header">
  <b>Enterprise SaaS Analytics Dashboard</b>
  <input type="file" id="file">
  <button onclick="toggleTheme()">Theme</button>
</div>

<div class="kpis">
  <div class="kpi">
    <h4>Revenue</h4>
    <p id="rev">$0</p>
    <div class="trend" id="revTrend"></div>
  </div>

  <div class="kpi">
    <h4>Orders</h4>
    <p id="ord">0</p>
  </div>

  <div class="kpi">
    <h4>Top Product</h4>
    <p id="top">-</p>
  </div>

  <div class="kpi">
    <h4>Avg Order</h4>
    <p id="avg">$0</p>
  </div>
</div>

<div class="grid">
  <div class="box"><canvas id="c1"></canvas></div>
  <div class="box"><canvas id="c2"></canvas></div>
  <div class="box"><canvas id="c3"></canvas></div>
  <div class="box"><canvas id="c4"></canvas></div>
</div>

<script>

let raw=[];
let charts=[];

/* STRONG CLEANER (FIXES "undefined") */
function clean(v,fallback){
  if(v===null||v===undefined) return fallback;

  v = String(v)
    .replace(/\u00A0/g," ")
    .trim();

  if(!v || v.toLowerCase()==="undefined") return fallback;

  return v;
}

/* DATE FIX */
function fixDate(v){
  if(typeof v==="number"){
    const d=XLSX.SSF.parse_date_code(v);
    if(!d) return v;
    return `${d.y}-${String(d.m).padStart(2,'0')}-${String(d.d).padStart(2,'0')}`;
  }
  return v;
}

/* THEME */
function toggleTheme(){
  document.body.classList.toggle("light");
}

/* FILE LOAD */
document.getElementById("file").onchange=e=>{
  const reader=new FileReader();

  reader.onload=ev=>{
    const wb=XLSX.read(new Uint8Array(ev.target.result),{type:"array"});
    const sh=wb.Sheets[wb.SheetNames[0]];

    const json=XLSX.utils.sheet_to_json(sh,{
      defval:"",
      raw:false
    });

    raw=json.map(r=>{
      let o={Product:"",Region:"",Date:"",Revenue:0};

      Object.keys(r).forEach(k=>{
        let key=k.toLowerCase().trim();

        if(key.includes("product")) o.Product=r[k];
        if(key.includes("region")) o.Region=r[k];
        if(key.includes("date")) o.Date=fixDate(r[k]);
        if(key.includes("revenue")) o.Revenue=Number(r[k])||0;
      });

      return o;
    }).filter(r=>r.Date);

    render();
  };

  reader.readAsArrayBuffer(e.target.files[0]);
};

/* GROUP TOP 5 + OTHER (ENTERPRISE FEATURE) */
function groupTop5(obj){
  let entries = Object.entries(obj)
    .map(([k,v])=>[clean(k,"Unassigned"),v])
    .sort((a,b)=>b[1]-a[1]);

  let top5 = entries.slice(0,5);
  let other = entries.slice(5).reduce((a,b)=>a+b[1],0);

  if(other>0) top5.push(["Other",other]);

  return {
    labels: top5.map(x=>x[0]),
    values: top5.map(x=>x[1])
  };
}

/* RENDER */
function render(){

  let rev=0,p={},r={},d={};
  let prevRev = window._prevRev || 0;

  raw.forEach(x=>{
    let v=Number(x.Revenue)||0;
    rev+=v;

    let product=clean(x.Product,"Unassigned Product");
    let region=clean(x.Region,"Unassigned Region");
    let date=clean(x.Date,"Unknown Date");

    p[product]=(p[product]||0)+v;
    r[region]=(r[region]||0)+v;
    d[date]=(d[date]||0)+v;
  });

  let top=Object.keys(p).reduce((a,b)=>p[a]>p[b]?a:b,"-");

  /* KPI TREND */
  let change = prevRev ? ((rev-prevRev)/prevRev*100).toFixed(1) : 0;
  let trend = document.getElementById("revTrend");
  trend.innerHTML = rev>=prevRev
    ? `▲ ${change}%`
    : `▼ ${change}%`;

  trend.className = rev>=prevRev ? "trend good" : "trend bad";

  window._prevRev = rev;

  document.getElementById("rev").innerText="$"+rev.toLocaleString();
  document.getElementById("ord").innerText=raw.length;
  document.getElementById("top").innerText=top;
  document.getElementById("avg").innerText="$"+(rev/(raw.length||1)).toFixed(2);

  renderCharts(p,r,d);
}

/* CHARTS (CLEAN + CENTERED LEGENDS) */
function renderCharts(p,r,d){

  charts.forEach(c=>c.destroy());
  charts=[];

  const prod = groupTop5(p);
  const reg = groupTop5(r);
  const dat = groupTop5(d);

  const baseOptions = {
    responsive:true,
    maintainAspectRatio:false,
    plugins:{
      legend:{
        align:"center",
        labels:{textAlign:"center"}
      }
    }
  };

  charts.push(new Chart(c1,{
    type:"bar",
    data:{labels:prod.labels,datasets:[{data:prod.values}]},
    options:baseOptions
  }));

  charts.push(new Chart(c2,{
    type:"pie",
    data:{labels:reg.labels,datasets:[{data:reg.values}]},
    options:baseOptions
  }));

  charts.push(new Chart(c3,{
    type:"line",
    data:{labels:dat.labels,datasets:[{data:dat.values}]},
    options:baseOptions
  }));

  charts.push(new Chart(c4,{
    type:"bar",
    data:{labels:dat.labels,datasets:[{data:dat.values}]},
    options:baseOptions
  }));
}

</script>

</body>
</html>
