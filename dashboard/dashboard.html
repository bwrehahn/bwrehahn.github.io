<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Clean Stable Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b1220;
  color:#e5e7eb;
}

.header{
  padding:15px;
  border-bottom:1px solid #1f2a44;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.kpis{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:10px;
  padding:15px;
}

.kpi{
  background:#111c33;
  padding:12px;
  border-radius:10px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:15px;
  padding:15px;
}

.card{
  background:#111c33;
  border-radius:12px;
  padding:10px;
  height:320px;
}

/* FIXED CHART SIZE */
canvas{
  width:100% !important;
  height:300px !important;
}
</style>
</head>

<body>

<div class="header">
  <b>Stable Excel Dashboard (FINAL)</b>
  <input type="file" id="file">
</div>

<div class="kpis">
  <div class="kpi"><div>Revenue</div><div id="rev">$0</div></div>
  <div class="kpi"><div>Orders</div><div id="ord">0</div></div>
  <div class="kpi"><div>Top Product</div><div id="top">-</div></div>
  <div class="kpi"><div>Avg Order</div><div id="avg">$0</div></div>
</div>

<div class="grid">
  <div class="card"><canvas id="c1"></canvas></div>
  <div class="card"><canvas id="c2"></canvas></div>
  <div class="card"><canvas id="c3"></canvas></div>
  <div class="card"><canvas id="c4"></canvas></div>
</div>

<script>

let raw=[];
let charts=[];

/* LOAD EXCEL (POSITION-BASED PARSER = BULLETPROOF) */
document.getElementById("file").addEventListener("change", e=>{
  let file=e.target.files[0];
  let reader=new FileReader();

  reader.onload=ev=>{
    let wb=XLSX.read(ev.target.result,{type:"binary"});
    let sheet=wb.Sheets[wb.SheetNames[0]];

    let json=XLSX.utils.sheet_to_json(sheet,{
      header:1,
      defval:""
    });

    if(!json.length){
      alert("Empty Excel file");
      return;
    }

    let headers=json[0].map(h=>String(h).trim().toLowerCase());

    raw=json.slice(1).map(row=>{
      let obj={};

      headers.forEach((h,i)=>{
        obj[h]=row[i];
      });

      return {
        Product: obj.product || "",
        Region: obj.region || "",
        Date: obj.date || "",
        Revenue: Number(obj.revenue) || 0
      };
    }).filter(r=>r.Product && r.Region && r.Date);

    render();
  };

  reader.readAsBinaryString(file);
});

/* GROUP DATA SAFELY */
function group(field){
  let map=new Map();

  raw.forEach(r=>{
    let key=r[field];
    if(!key || key==="undefined") return;

    map.set(key,(map.get(key)||0)+r.Revenue);
  });

  return {
    labels:[...map.keys()],
    values:[...map.values()]
  };
}

/* RENDER DASHBOARD */
function render(){

  let total=0;
  let p={},r={},d={};

  raw.forEach(x=>{
    total+=x.Revenue;

    p[x.Product]=(p[x.Product]||0)+x.Revenue;
    r[x.Region]=(r[x.Region]||0)+x.Revenue;
    d[x.Date]=(d[x.Date]||0)+x.Revenue;
  });

  let top=Object.keys(p).reduce((a,b)=>p[a]>p[b]?a:b,"-");

  document.getElementById("rev").innerText="$"+total.toLocaleString();
  document.getElementById("ord").innerText=raw.length;
  document.getElementById("top").innerText=top;
  document.getElementById("avg").innerText="$"+(total/(raw.length||1)).toFixed(2);

  drawCharts();
}

/* CHARTS (CLEAN + STABLE) */
function drawCharts(){

  charts.forEach(c=>c.destroy());
  charts=[];

  let p=group("Product");
  let r=group("Region");
  let d=group("Date");

  charts.push(new Chart(c1,{
    type:"bar",
    data:{labels:p.labels,datasets:[{data:p.values}]}
  }));

  charts.push(new Chart(c2,{
    type:"pie",
    data:{labels:r.labels,datasets:[{data:r.values}]}
  }));

  charts.push(new Chart(c3,{
    type:"line",
    data:{labels:d.labels,datasets:[{data:d.values}]}
  }));

  charts.push(new Chart(c4,{
    type:"bar",
    data:{labels:d.labels,datasets:[{data:d.values}]}
  }));

}

</script>

</body>
</html>
