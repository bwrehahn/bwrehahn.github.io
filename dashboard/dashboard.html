<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Senior Analytics Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
:root{
  --bg:#0b1220;
  --card:#111c33;
  --muted:#94a3b8;
  --text:#e5e7eb;
  --accent:#3b82f6;
}

*{box-sizing:border-box}

body{
  margin:0;
  font-family:Arial;
  background:var(--bg);
  color:var(--text);
  animation:fadeIn .6s ease;
}

@keyframes fadeIn{
  from{opacity:0;transform:translateY(10px)}
  to{opacity:1;transform:translateY(0)}
}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  padding:15px;
  border-bottom:1px solid #1f2a44;
  position:sticky;
  top:0;
  background:var(--bg);
  z-index:10;
}

.title{
  font-size:18px;
  font-weight:bold;
}

.actions{
  display:flex;
  gap:10px;
}

button{
  background:var(--card);
  border:none;
  color:var(--text);
  padding:6px 10px;
  border-radius:8px;
  cursor:pointer;
}

button:hover{
  transform:translateY(-2px);
  transition:.2s;
  background:#1a2a4a;
}

/* CHIPS */
.chips{
  display:flex;
  gap:8px;
  padding:10px 15px;
  flex-wrap:wrap;
}

.chip{
  background:var(--card);
  padding:6px 10px;
  border-radius:20px;
  font-size:12px;
  cursor:pointer;
}

/* KPI */
.kpis{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:10px;
  padding:15px;
}

.kpi{
  background:var(--card);
  padding:15px;
  border-radius:12px;
  transition:.2s;
}

.kpi:hover{
  transform:translateY(-3px);
}

.kpi h4{
  margin:0;
  font-size:12px;
  color:var(--muted);
}

.kpi p{
  font-size:20px;
  margin:8px 0 0;
}

/* INSIGHT */
.insight{
  margin:0 15px 15px;
  padding:12px;
  background:var(--card);
  border-radius:12px;
  color:var(--muted);
  animation:fadeIn .4s ease;
}

/* CHARTS */
.grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:15px;
  padding:15px;
}

.box{
  background:var(--card);
  border-radius:12px;
  padding:10px;
  height:260px;
  transition:.2s;
}

.box:hover{
  transform:scale(1.01);
}

canvas{
  width:100%!important;
  height:220px!important;
}

/* TABLE */
table{
  width:calc(100% - 30px);
  margin:15px;
  border-collapse:collapse;
  background:var(--card);
  border-radius:12px;
  overflow:hidden;
}

td,th{
  padding:8px;
  border-bottom:1px solid #1f2a44;
}

th{
  color:var(--muted);
  cursor:pointer;
}

/* LOADING */
.loading{
  display:none;
  padding:15px;
  color:var(--muted);
}
</style>
</head>

<body>

<div class="header">
  <div class="title">Senior Analytics Dashboard</div>
  <div class="actions">
    <input type="file" id="file">
    <button onclick="exportCSV()">Export CSV</button>
  </div>
</div>

<div class="chips" id="chips"></div>

<div class="kpis">
  <div class="kpi"><h4>Revenue</h4><p id="rev">$0</p></div>
  <div class="kpi"><h4>Orders</h4><p id="ord">0</p></div>
  <div class="kpi"><h4>Top Product</h4><p id="top">-</p></div>
  <div class="kpi"><h4>Avg Order</h4><p id="avg">$0</p></div>
</div>

<div class="insight" id="insight">Upload data to generate insights...</div>

<div class="loading" id="loading">Processing data...</div>

<div class="grid">
  <div class="box"><canvas id="c1"></canvas></div>
  <div class="box"><canvas id="c2"></canvas></div>
  <div class="box"><canvas id="c3"></canvas></div>
  <div class="box"><canvas id="c4"></canvas></div>
</div>

<table>
<thead>
<tr>
<th>Date</th><th>Product</th><th>Region</th><th>Revenue</th>
</tr>
</thead>
<tbody id="table"></tbody>
</table>

<script>

let raw=[];
let filters={product:null,region:null};
let charts=[];

document.getElementById('file').onchange=e=>{
  document.getElementById('loading').style.display="block";

  let r=new FileReader();
  r.onload=ev=>{
    let wb=XLSX.read(new Uint8Array(ev.target.result),{type:'array'});
    let sh=wb.Sheets[wb.SheetNames[0]];
    raw=XLSX.utils.sheet_to_json(sh);
    render();
    document.getElementById('loading').style.display="none";
  };
  r.readAsArrayBuffer(e.target.files[0]);
};

function setFilter(type,value){
  filters[type]=value;
  render();
}

function clearFilter(type){
  filters[type]=null;
  render();
}

/* CSV EXPORT */
function exportCSV(){
  let csv="Date,Product,Region,Revenue\n";
  raw.forEach(r=>{
    csv+=`${r.Date},${r.Product},${r.Region},${r.Revenue}\n`;
  });
  let blob=new Blob([csv],{type:"text/csv"});
  let a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download="filtered-data.csv";
  a.click();
}

/* RENDER */
function render(){

  let data=raw.filter(r=>{
    return (!filters.product||r.Product===filters.product)&&
           (!filters.region||r.Region===filters.region);
  });

  let rev=0,p={},r={},d={};

  data.forEach(x=>{
    let v=+x.Revenue||0;
    rev+=v;
    p[x.Product]=(p[x.Product]||0)+v;
    r[x.Region]=(r[x.Region]||0)+v;
    d[x.Date]=(d[x.Date]||0)+v;
  });

  let top=Object.keys(p).reduce((a,b)=>p[a]>p[b]?a:b,"-");

  document.getElementById('rev').innerText="$"+rev.toLocaleString();
  document.getElementById('ord').innerText=data.length;
  document.getElementById('top').innerText=top;
  document.getElementById('avg').innerText="$"+(rev/(data.length||1)).toFixed(2);

  document.getElementById('insight').innerText=
    `Insight: ${top} leads revenue. Total revenue is $${rev.toLocaleString()}.`;

  renderChips();
  renderTable(data);
  renderCharts(p,r,d);
}

/* CHIPS */
function renderChips(){
  let c=document.getElementById('chips');
  c.innerHTML="";

  if(filters.product)
    c.innerHTML+=`<div class="chip" onclick="clearFilter('product')">Product: ${filters.product} ✕</div>`;

  if(filters.region)
    c.innerHTML+=`<div class="chip" onclick="clearFilter('region')">Region: ${filters.region} ✕</div>`;
}

/* TABLE */
function renderTable(data){
  document.getElementById('table').innerHTML=
    data.map(r=>`
      <tr>
        <td>${r.Date}</td>
        <td>${r.Product}</td>
        <td>${r.Region}</td>
        <td>${r.Revenue}</td>
      </tr>`).join('');
}

/* CHARTS */
function renderCharts(p,r,d){

  charts.forEach(c=>c.destroy());
  charts=[];

  charts.push(new Chart(c1,{
    type:'bar',
    data:{labels:Object.keys(p),
    datasets:[{data:Object.values(p)}]},
    options:{
      onClick:(e,i)=>{
        if(i.length)setFilter('product',Object.keys(p)[i[0].index]);
      }
    }
  }));

  charts.push(new Chart(c2,{
    type:'pie',
    data:{labels:Object.keys(r),
    datasets:[{data:Object.values(r)}]},
    options:{
      onClick:(e,i)=>{
        if(i.length)setFilter('region',Object.keys(r)[i[0].index]);
      }
    }
  }));

  charts.push(new Chart(c3,{
    type:'line',
    data:{labels:Object.keys(d),
    datasets:[{data:Object.values(d)}]}
  }));

  charts.push(new Chart(c4,{
    type:'bar',
    data:{labels:Object.keys(d),
    datasets:[{data:Object.values(d)}]}
  }));
}

</script>

</body>
</html>
