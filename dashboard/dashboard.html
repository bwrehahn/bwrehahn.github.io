<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Senior SaaS Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
:root{
  --bg:#0b1220;
  --card:#111c33;
  --text:#e5e7eb;
  --muted:#94a3b8;
  --green:#22c55e;
  --red:#ef4444;
}

body.light{
  --bg:#f4f6f8;
  --card:#ffffff;
  --text:#111;
  --muted:#555;
}

body{
  margin:0;
  font-family:Arial;
  background:var(--bg);
  color:var(--text);
}

.header{
  display:flex;
  justify-content:space-between;
  padding:15px;
  border-bottom:1px solid #1f2a44;
  align-items:center;
}

.actions{ display:flex; gap:10px; }

button{
  background:var(--card);
  color:var(--text);
  border:none;
  padding:6px 10px;
  border-radius:8px;
  cursor:pointer;
}

.kpis{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:10px;
  padding:10px 15px 0;
}

.kpi{
  background:var(--card);
  padding:10px;
  border-radius:10px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:15px;
  padding:15px;
}

.box{
  background:var(--card);
  height:320px;
  border-radius:12px;
  padding:10px;
}

canvas{
  width:100%!important;
  height:100%!important;
}

table{
  width:calc(100% - 30px);
  margin:15px;
  background:var(--card);
  border-collapse:collapse;
}

th,td{
  padding:10px;
  border-bottom:1px solid #1f2a44;
}

th{ color:var(--muted); }
</style>
</head>

<body>

<div class="header">
  <b>Senior SaaS Dashboard</b>
  <div class="actions">
    <input type="file" id="file">
    <button onclick="toggleTheme()">🌙 Theme</button>
    <button onclick="exportCSV()">Export CSV</button>
  </div>
</div>

<div class="kpis">
  <div class="kpi">Revenue <span id="kpiRevenue">-</span></div>
  <div class="kpi">Orders <span id="kpiOrders">-</span></div>
  <div class="kpi">Avg Order <span id="kpiAvg">-</span></div>
  <div class="kpi">Trend <span id="kpiTrend">-</span></div>
</div>

<div class="grid">
  <div class="box"><canvas id="c1"></canvas></div>
  <div class="box"><canvas id="c2"></canvas></div>
  <div class="box"><canvas id="c3"></canvas></div>
  <div class="box"><canvas id="c4"></canvas></div>
</div>

<table>
<thead>
<tr>
<th>Date</th><th>Product</th><th>Region</th><th>Revenue</th>
</tr>
</thead>
<tbody id="table"></tbody>
</table>

<script>

let raw=[];
let charts=[];
let drillState=null;

/* ================= KPI HELPERS ================= */

const money = v => "$" + Number(v).toLocaleString();

/* ================= LOAD ================= */

document.getElementById('file').onchange = e=>{
  const reader = new FileReader();

  reader.onload = ev=>{
    const wb = XLSX.read(new Uint8Array(ev.target.result),{type:'array'});
    const sh = wb.Sheets[wb.SheetNames[0]];

    raw = XLSX.utils.sheet_to_json(sh,{defval:""}).map(r=>({
      Date:r.Date,
      Product:r.Product,
      Region:r.Region,
      Revenue:Number(r.Revenue)||0
    }));

    render();
  };

  reader.readAsArrayBuffer(e.target.files[0]);
};

/* ================= RENDER TABLE ================= */

function renderTable(data=raw){
  document.getElementById("table").innerHTML =
    data.map(r=>`
      <tr>
        <td>${r.Date}</td>
        <td>${r.Product}</td>
        <td>${r.Region}</td>
        <td>${r.Revenue}</td>
      </tr>
    `).join('');
}

/* ================= DRILL ================= */

function drill(field,value){

  if(drillState?.field===field && drillState?.value===value){
    drillState=null;
    renderTable(raw);
    render();
    return;
  }

  drillState={field,value};
  const filtered = raw.filter(r=>r[field]===value);
  renderTable(filtered);
}

/* ================= KPI ================= */

function renderKPIs(){

  let total=0,p={},r={},d={};

  raw.forEach(x=>{
    total+=x.Revenue||0;
    p[x.Product]=(p[x.Product]||0)+x.Revenue;
    r[x.Region]=(r[x.Region]||0)+x.Revenue;
    d[x.Date]=(d[x.Date]||0)+x.Revenue;
  });

  const dates=Object.keys(d).sort((a,b)=>new Date(a)-new Date(b));
  const values=dates.map(k=>d[k]);

  let pct=0,arrow="—",color="var(--muted)";

  if(values.length>1){
    const prev=values.at(-2);
    const curr=values.at(-1);

    if(prev){
      pct=((curr-prev)/prev)*100;
      arrow=pct>=0?"▲":"▼";
      color=pct>=0?"var(--green)":"var(--red)";
    }
  }

  document.getElementById("kpiRevenue").innerText=money(total);
  document.getElementById("kpiOrders").innerText=raw.length;
  document.getElementById("kpiAvg").innerText=money(total/(raw.length||1));

  document.getElementById("kpiTrend").innerHTML =
    `<span style="color:${color}">${arrow} ${pct.toFixed(2)}%</span>`;
}

/* ================= CHART INTERACTION CORE ================= */

function baseOptions(title, field, labels){

  return {
    responsive:true,
    maintainAspectRatio:false,

    animation:{
      duration:900,
      easing:"easeOutQuart"
    },

    plugins:{
      title:{display:true,text:title},
      legend:{
        onClick:(e,legendItem,legend)=>{
          const index = legendItem.datasetIndex;
          const ci = legend.chart;

          ci.getDatasetMeta(index).hidden =
            !ci.getDatasetMeta(index).hidden;

          ci.update();
        }
      },
      tooltip:{
        callbacks:{
          label:(ctx)=>money(ctx.raw)
        }
      }
    },

    onClick:(evt,elements)=>{
      if(!elements.length) return;
      const i = elements[0].index;
      drill(field, labels[i]);
    }
  };
}

/* ================= CHARTS ================= */

function renderCharts(){

  charts.forEach(c=>c.destroy());
  charts=[];

  let p={},r={},d={};

  raw.forEach(x=>{
    p[x.Product]=(p[x.Product]||0)+x.Revenue;
    r[x.Region]=(r[x.Region]||0)+x.Revenue;
    d[x.Date]=(d[x.Date]||0)+x.Revenue;
  });

  const pL=Object.keys(p), pV=Object.values(p);
  const rL=Object.keys(r), rV=Object.values(r);
  const dL=Object.keys(d).sort((a,b)=>new Date(a)-new Date(b));
  const dV=dL.map(k=>d[k]);

  charts.push(new Chart(c1,{
    type:"bar",
    data:{labels:pL,datasets:[{label:"Revenue",data:pV}]},
    options:baseOptions("Revenue by Product","Product",pL)
  }));

  charts.push(new Chart(c2,{
    type:"pie",
    data:{labels:rL,datasets:[{label:"Revenue",data:rV}]},
    options:baseOptions("Revenue by Region","Region",rL)
  }));

  charts.push(new Chart(c3,{
    type:"line",
    data:{labels:dL,datasets:[{label:"Revenue",data:dV}]},
    options:baseOptions("Revenue Over Time","Date",dL)
  }));

  charts.push(new Chart(c4,{
    type:"bar",
    data:{labels:dL,datasets:[{label:"Revenue",data:dV}]},
    options:baseOptions("Daily Revenue","Date",dL)
  }));
}

/* ================= MAIN ================= */

function render(){
  renderKPIs();
  renderCharts();
  renderTable();
}

/* ================= EXPORT ================= */

function exportCSV(){
  let csv="Date,Product,Region,Revenue\n";
  raw.forEach(r=>{
    csv+=`${r.Date},${r.Product},${r.Region},${r.Revenue}\n`;
  });

  const blob=new Blob([csv],{type:"text/csv"});
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download="data.csv";
  a.click();
}

/* ================= THEME ================= */

function toggleTheme(){
  document.body.classList.toggle("light");
}

</script>

</body>
</html>
