<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Stable Enterprise Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
:root{
  --bg:#0b1220;
  --card:#111c33;
  --text:#e5e7eb;
  --muted:#94a3b8;
}

body.light{
  --bg:#f4f6f8;
  --card:#ffffff;
  --text:#111;
  --muted:#555;
}

body{
  margin:0;
  font-family:Arial;
  background:var(--bg);
  color:var(--text);
}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  padding:15px;
  border-bottom:1px solid #1f2a44;
  align-items:center;
}

.actions{
  display:flex;
  gap:10px;
}

button{
  background:var(--card);
  color:var(--text);
  border:none;
  padding:6px 10px;
  border-radius:8px;
  cursor:pointer;
}

/* KPI */
.kpis{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:10px;
  padding:15px;
}

.kpi{
  background:var(--card);
  padding:15px;
  border-radius:12px;
}

.kpi h4{
  margin:0;
  font-size:12px;
  color:var(--muted);
}

.kpi p{
  font-size:20px;
  margin:8px 0 0;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:15px;
  padding:15px;
}

.box{
  background:var(--card);
  border-radius:12px;
  padding:12px;
  height:320px;
}

canvas{
  width:100%!important;
  height:100%!important;
}

/* TABLE */
table{
  width:calc(100% - 30px);
  margin:15px;
  border-collapse:collapse;
  background:var(--card);
  border-radius:12px;
  overflow:hidden;
}

td,th{
  padding:8px;
  border-bottom:1px solid #1f2a44;
}

th{
  color:var(--muted);
}
</style>
</head>

<body>

<div class="header">
  <div><b>Analytics Dashboard</b></div>

  <div class="actions">
    <input type="file" id="file">
    <button onclick="toggleTheme()">🌙 Theme</button>
  </div>
</div>

<div class="kpis">
  <div class="kpi"><h4>Revenue</h4><p id="rev">$0</p></div>
  <div class="kpi"><h4>Orders</h4><p id="ord">0</p></div>
  <div class="kpi"><h4>Top Product</h4><p id="top">-</p></div>
  <div class="kpi"><h4>Avg Order</h4><p id="avg">$0</p></div>
</div>

<div class="grid">
  <div class="box"><canvas id="c1"></canvas></div>
  <div class="box"><canvas id="c2"></canvas></div>
  <div class="box"><canvas id="c3"></canvas></div>
  <div class="box"><canvas id="c4"></canvas></div>
</div>

<table>
<thead>
<tr>
<th>Date</th>
<th>Product</th>
<th>Region</th>
<th>Revenue</th>
</tr>
</thead>
<tbody id="table"></tbody>
</table>

<script>

let raw=[];
let charts=[];

/* THEME */
function toggleTheme(){
  document.body.classList.toggle("light");
}

/* SAFE FILE LOADER (FIXED) */
document.getElementById('file').addEventListener('change', function(e){

  const file = e.target.files[0];
  if(!file){
    alert("No file selected");
    return;
  }

  const reader = new FileReader();

  reader.onload = function(event){

    try {

      const workbook = XLSX.read(event.target.result, {
        type: "binary",
        cellDates: true
      });

      const sheetName = workbook.SheetNames[0];
      const sheet = workbook.Sheets[sheetName];

      let json = XLSX.utils.sheet_to_json(sheet, {
        defval: ""
      });

      // CLEAN HEADERS
      raw = json.map(row => {
        let clean = {};
        Object.keys(row).forEach(k => {
          clean[String(k).trim()] = row[k];
        });
        return clean;
      });

      if(!raw.length){
        alert("No data found in Excel file");
        return;
      }

      render();

    } catch(err){
      console.error(err);
      alert("Failed to read Excel file. Check format.");
    }
  };

  reader.readAsBinaryString(file);

});

/* MAIN RENDER */
function render(){

  let rev=0;
  let p={},r={},d={};

  raw.forEach(x=>{

    let product=(x.Product||"").trim();
    let region=(x.Region||"").trim();
    let date=(x.Date||"").toString().trim();
    let value=Number(x.Revenue)||0;

    if(!product||!region||!date) return;

    rev+=value;

    p[product]=(p[product]||0)+value;
    r[region]=(r[region]||0)+value;
    d[date]=(d[date]||0)+value;
  });

  let top=Object.keys(p).reduce((a,b)=>p[a]>p[b]?a:b,"-");

  document.getElementById("rev").innerText="$"+rev.toLocaleString();
  document.getElementById("ord").innerText=raw.length;
  document.getElementById("top").innerText=top;
  document.getElementById("avg").innerText="$"+(rev/(raw.length||1)).toFixed(2);

  renderTable();
  renderCharts(p,r,d);
}

/* TABLE */
function renderTable(){
  document.getElementById("table").innerHTML =
    raw.map(r=>`
      <tr>
        <td>${r.Date}</td>
        <td>${r.Product}</td>
        <td>${r.Region}</td>
        <td>${r.Revenue}</td>
      </tr>
    `).join("");
}

/* CHARTS */
function renderCharts(p,r,d){

  charts.forEach(c=>c.destroy());
  charts=[];

  charts.push(new Chart(c1,{
    type:"bar",
    data:{
      labels:Object.keys(p),
      datasets:[{data:Object.values(p)}]
    }
  }));

  charts.push(new Chart(c2,{
    type:"pie",
    data:{
      labels:Object.keys(r),
      datasets:[{data:Object.values(r)}]
    }
  }));

  charts.push(new Chart(c3,{
    type:"line",
    data:{
      labels:Object.keys(d),
      datasets:[{data:Object.values(d)}]
    }
  }));

  charts.push(new Chart(c4,{
    type:"bar",
    data:{
      labels:Object.keys(d),
      datasets:[{data:Object.values(d)}]
    }
  }));

}

</script>

</body>
</html>
