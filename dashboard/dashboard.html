<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Senior SaaS Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
:root{
  --bg:#0b1220;
  --card:#111c33;
  --text:#e5e7eb;
  --muted:#94a3b8;
}

body.light{
  --bg:#f4f6f8;
  --card:#ffffff;
  --text:#111;
  --muted:#555;
}

body{
  margin:0;
  font-family:Arial;
  background:var(--bg);
  color:var(--text);
}

.header{
  display:flex;
  justify-content:space-between;
  padding:15px;
  border-bottom:1px solid #1f2a44;
  align-items:center;
}

.actions{
  display:flex;
  gap:10px;
}

button{
  background:var(--card);
  color:var(--text);
  border:none;
  padding:6px 10px;
  border-radius:8px;
  cursor:pointer;
}

button:hover{
  opacity:.85;
}

.chips{
  display:flex;
  gap:8px;
  padding:10px 15px;
  flex-wrap:wrap;
}

.chip{
  background:var(--card);
  padding:6px 10px;
  border-radius:20px;
  font-size:12px;
  cursor:pointer;
}

.kpis{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:10px;
  padding:15px;
}

.kpi{
  background:var(--card);
  padding:15px;
  border-radius:12px;
}

.kpi h4{
  margin:0;
  font-size:12px;
  color:var(--muted);
}

.kpi p{
  font-size:20px;
  margin:8px 0 0;
}

.insight{
  margin:0 15px 15px;
  padding:12px;
  background:var(--card);
  border-radius:12px;
  color:var(--muted);
}

.grid{
  display:grid;
  grid-template-columns:repeat(2, minmax(0, 1fr));
  gap:15px;
  padding:15px;
}

.box{
  background:var(--card);
  border-radius:12px;
  padding:12px;
  height:320px;
}

canvas{
  width:100%!important;
  height:100%!important;
}

table{
  width:calc(100% - 30px);
  margin:15px;
  border-collapse:collapse;
  background:var(--card);
  border-radius:12px;
  overflow:hidden;
}

td,th{
  padding:8px;
  border-bottom:1px solid #1f2a44;
}

th{
  color:var(--muted);
}
</style>
</head>

<body>

<div class="header">
  <b>Senior Analytics Dashboard</b>

  <div class="actions">
    <input type="file" id="file">
    <button onclick="toggleTheme()">Theme</button>
  </div>
</div>

<div class="chips" id="chips"></div>

<div class="kpis">
  <div class="kpi"><h4>Revenue</h4><p id="rev">$0</p></div>
  <div class="kpi"><h4>Orders</h4><p id="ord">0</p></div>
  <div class="kpi"><h4>Top Product</h4><p id="top">-</p></div>
  <div class="kpi"><h4>Avg Order</h4><p id="avg">$0</p></div>
</div>

<div class="insight" id="insight">Upload file to begin analysis...</div>

<div class="grid">
  <div class="box"><canvas id="c1"></canvas></div>
  <div class="box"><canvas id="c2"></canvas></div>
  <div class="box"><canvas id="c3"></canvas></div>
  <div class="box"><canvas id="c4"></canvas></div>
</div>

<table>
<thead>
<tr>
<th>Date</th><th>Product</th><th>Region</th><th>Revenue</th>
</tr>
</thead>
<tbody id="table"></tbody>
</table>

<script>

let raw=[];
let filters={product:null,region:null};
let charts=[];

function toggleTheme(){
  document.body.classList.toggle("light");
}

/* ✅ FIX: CLEAN DATE FUNCTION */
function cleanDate(v){
  if(v === null || v === undefined) return null;

  if(typeof v === "number"){
    const d = XLSX.SSF.parse_date_code(v);
    if(!d) return null;
    return `${d.y}-${String(d.m).padStart(2,'0')}-${String(d.d).padStart(2,'0')}`;
  }

  v = String(v).trim();
  if(!v || v.toLowerCase()==="undefined") return null;

  return v;
}

/* FILE LOAD */
document.getElementById('file').onchange=e=>{
  let r=new FileReader();

  r.onload=ev=>{
    let wb=XLSX.read(new Uint8Array(ev.target.result),{type:'array'});
    let sh=wb.Sheets[wb.SheetNames[0]];
    raw=XLSX.utils.sheet_to_json(sh);
    render();
  };

  r.readAsArrayBuffer(e.target.files[0]);
};

function render(){

  let data=raw.filter(r=>{
    return (!filters.product||r.Product===filters.product)&&
           (!filters.region||r.Region===filters.region);
  });

  let rev=0,p={},r={},d={};

  data.forEach(x=>{
    let v=+x.Revenue||0;
    rev+=v;

    p[x.Product]=(p[x.Product]||0)+v;
    r[x.Region]=(r[x.Region]||0)+v;

    /* ✅ FIXED DATE HANDLING */
    let date = cleanDate(x.Date);
    if(date){
      d[date]=(d[date]||0)+v;
    }
  });

  let top=Object.keys(p).reduce((a,b)=>p[a]>p[b]?a:b,"-");

  document.getElementById('rev').innerText="$"+rev.toLocaleString();
  document.getElementById('ord').innerText=data.length;
  document.getElementById('top').innerText=top;
  document.getElementById('avg').innerText="$"+(rev/(data.length||1)).toFixed(2);

  renderTable(data);
  renderCharts(p,r,d);
}

function renderTable(data){
  document.getElementById('table').innerHTML=
    data.map(r=>`
      <tr>
        <td>${r.Date}</td>
        <td>${r.Product}</td>
        <td>${r.Region}</td>
        <td>${r.Revenue}</td>
      </tr>`).join('');
}

function renderCharts(p,r,d){

  charts.forEach(c=>c.destroy());
  charts=[];

  charts.push(new Chart(c1,{
    type:'bar',
    data:{labels:Object.keys(p),datasets:[{data:Object.values(p)}]},
    options:{responsive:true,maintainAspectRatio:false}
  }));

  charts.push(new Chart(c2,{
    type:'pie',
    data:{labels:Object.keys(r),datasets:[{data:Object.values(r)}]},
    options:{responsive:true,maintainAspectRatio:false}
  }));

  /* ✅ FIXED BOTTOM CHART (SORTED DATES) */
  const sortedDates = Object.keys(d).sort((a,b)=>new Date(a)-new Date(b));

  charts.push(new Chart(c3,{
    type:'line',
    data:{
      labels: sortedDates,
      datasets:[{
        data: sortedDates.map(k=>d[k])
      }]
    },
    options:{responsive:true,maintainAspectRatio:false}
  }));

  charts.push(new Chart(c4,{
    type:'bar',
    data:{labels:Object.keys(d),datasets:[{data:Object.values(d)}]},
    options:{responsive:true,maintainAspectRatio:false}
  }));
}

</script>

</body>
</html>
