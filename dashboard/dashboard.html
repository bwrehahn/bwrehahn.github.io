<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Stable Enterprise Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b1220;
  color:#e5e7eb;
}

.header{
  padding:15px;
  display:flex;
  justify-content:space-between;
  border-bottom:1px solid #1f2a44;
}

.grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:15px;
  padding:15px;
}

.card{
  background:#111c33;
  border-radius:12px;
  padding:12px;
  height:320px;
}

/* FIX CHART OVERFLOW */
canvas{
  width:100% !important;
  height:100% !important;
}

.kpis{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:10px;
  padding:15px;
}

.kpi{
  background:#111c33;
  padding:12px;
  border-radius:10px;
}

.kpi h4{
  margin:0;
  font-size:12px;
  color:#94a3b8;
}

.kpi p{
  margin:6px 0 0;
  font-size:18px;
}
</style>
</head>

<body>

<div class="header">
  <div><b>Clean Analytics Dashboard</b></div>
  <input type="file" id="file">
</div>

<div class="kpis">
  <div class="kpi"><h4>Revenue</h4><p id="rev">$0</p></div>
  <div class="kpi"><h4>Orders</h4><p id="ord">0</p></div>
  <div class="kpi"><h4>Top Product</h4><p id="top">-</p></div>
  <div class="kpi"><h4>Avg Order</h4><p id="avg">$0</p></div>
</div>

<div class="grid">
  <div class="card"><canvas id="c1"></canvas></div>
  <div class="card"><canvas id="c2"></canvas></div>
  <div class="card"><canvas id="c3"></canvas></div>
  <div class="card"><canvas id="c4"></canvas></div>
</div>

<script>

let raw=[];
let charts=[];

/* CLEAN ROWS (fixes Excel inconsistencies) */
function cleanRow(row){
  let clean={
    Product:null,
    Region:null,
    Date:null,
    Revenue:null
  };

  Object.keys(row).forEach(k=>{
    let key=k.toLowerCase().replace(/\s+/g,"");

    if(key.includes("product")) clean.Product=row[k];
    else if(key.includes("region")) clean.Region=row[k];
    else if(key.includes("date")) clean.Date=row[k];
    else if(key.includes("revenue")) clean.Revenue=row[k];
  });

  return clean;
}

/* FILE LOAD */
document.getElementById('file').addEventListener('change',e=>{
  let file=e.target.files[0];
  let reader=new FileReader();

  reader.onload=ev=>{
    let wb=XLSX.read(ev.target.result,{type:"binary"});
    let sheet=wb.Sheets[wb.SheetNames[0]];

    let json=XLSX.utils.sheet_to_json(sheet,{defval:""});

    raw=json.map(cleanRow).filter(r=>r.Product&&r.Region&&r.Date);

    render();
  };

  reader.readAsBinaryString(file);
});

/* SANITIZER (THIS FIXES "undefined") */
function sanitize(obj){
  let labels=[];
  let values=[];

  Object.entries(obj).forEach(([k,v])=>{
    if(k && k.trim() !== "" && k !== "undefined"){
      labels.push(k);
      values.push(v);
    }
  });

  return {labels, values};
}

/* RENDER */
function render(){

  let rev=0;
  let p={},r={},d={};

  raw.forEach(x=>{
    let v=Number(x.Revenue)||0;
    rev+=v;

    if(x.Product) p[x.Product]=(p[x.Product]||0)+v;
    if(x.Region) r[x.Region]=(r[x.Region]||0)+v;
    if(x.Date) d[x.Date]=(d[x.Date]||0)+v;
  });

  let top=Object.keys(p).reduce((a,b)=>p[a]>p[b]?a:b,"-");

  document.getElementById("rev").innerText="$"+rev.toLocaleString();
  document.getElementById("ord").innerText=raw.length;
  document.getElementById("top").innerText=top;
  document.getElementById("avg").innerText="$"+(rev/(raw.length||1)).toFixed(2);

  drawCharts(p,r,d);
}

/* CHARTS (FULLY SAFE) */
function drawCharts(p,r,d){

  charts.forEach(c=>c.destroy());
  charts=[];

  let pClean=sanitize(p);
  let rClean=sanitize(r);
  let dClean=sanitize(d);

  charts.push(new Chart(c1,{
    type:"bar",
    data:{
      labels:pClean.labels,
      datasets:[{data:pClean.values}]
    }
  }));

  charts.push(new Chart(c2,{
    type:"pie",
    data:{
      labels:rClean.labels,
      datasets:[{data:rClean.values}]
    }
  }));

  charts.push(new Chart(c3,{
    type:"line",
    data:{
      labels:dClean.labels,
      datasets:[{data:dClean.values}]
    }
  }));

  charts.push(new Chart(c4,{
    type:"bar",
    data:{
      labels:dClean.labels,
      datasets:[{data:dClean.values}]
    }
  }));

}

</script>

</body>
</html>
