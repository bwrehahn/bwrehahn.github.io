<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Senior SaaS Dashboard (Stable)</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
:root{
  --bg:#0b1220;
  --card:#111c33;
  --text:#e5e7eb;
  --muted:#94a3b8;
}

body.light{
  --bg:#f4f6f8;
  --card:#ffffff;
  --text:#111;
  --muted:#555;
}

body{
  margin:0;
  font-family:Arial;
  background:var(--bg);
  color:var(--text);
}

.header{
  display:flex;
  justify-content:space-between;
  padding:15px;
  border-bottom:1px solid #1f2a44;
  align-items:center;
}

.actions{
  display:flex;
  gap:10px;
}

button{
  background:var(--card);
  color:var(--text);
  border:none;
  padding:6px 10px;
  border-radius:8px;
  cursor:pointer;
}

.chips{
  display:flex;
  gap:8px;
  padding:10px 15px;
  flex-wrap:wrap;
}

.chip{
  background:var(--card);
  padding:6px 10px;
  border-radius:20px;
  font-size:12px;
  cursor:pointer;
}

.kpis{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:10px;
  padding:15px;
}

.kpi{
  background:var(--card);
  padding:15px;
  border-radius:12px;
}

.kpi h4{
  margin:0;
  font-size:12px;
  color:var(--muted);
}

.kpi p{
  margin:8px 0 0;
  font-size:20px;
}

.insight{
  margin:0 15px 15px;
  padding:12px;
  background:var(--card);
  border-radius:12px;
  color:var(--muted);
}

.grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:15px;
  padding:15px;
}

.box{
  background:var(--card);
  border-radius:12px;
  padding:12px;
  height:320px;
}

canvas{
  width:100%!important;
  height:100%!important;
}

table{
  width:calc(100% - 30px);
  margin:15px;
  border-collapse:collapse;
  background:var(--card);
  border-radius:12px;
  overflow:hidden;
}

td,th{
  padding:8px;
  border-bottom:1px solid #1f2a44;
}

th{color:var(--muted);}
</style>
</head>

<body>

<div class="header">
  <div><b>Senior Analytics Dashboard (Fixed)</b></div>
  <div class="actions">
    <input type="file" id="file">
    <button onclick="toggleTheme()">🌙 Theme</button>
  </div>
</div>

<div class="chips" id="chips"></div>

<div class="kpis">
  <div class="kpi"><h4>Revenue</h4><p id="rev">$0</p></div>
  <div class="kpi"><h4>Orders</h4><p id="ord">0</p></div>
  <div class="kpi"><h4>Top Product</h4><p id="top">-</p></div>
  <div class="kpi"><h4>Avg Order</h4><p id="avg">$0</p></div>
</div>

<div class="insight" id="insight">Upload file to begin...</div>

<div class="grid">
  <div class="box"><canvas id="c1"></canvas></div>
  <div class="box"><canvas id="c2"></canvas></div>
  <div class="box"><canvas id="c3"></canvas></div>
  <div class="box"><canvas id="c4"></canvas></div>
</div>

<table>
<thead>
<tr>
<th>Date</th><th>Product</th><th>Region</th><th>Revenue</th>
</tr>
</thead>
<tbody id="table"></tbody>
</table>

<script>

let raw=[];
let filters={product:null,region:null};
let charts=[];

/* SAFE RENDER HELPER (fixes "undefined") */
function safe(v){
  return (v === undefined || v === null || v === "" || v === "undefined")
    ? ""
    : v;
}

/* THEME */
function toggleTheme(){
  document.body.classList.toggle("light");
}

/* DATE FIX */
function fixDate(v){
  if(typeof v === "number"){
    const d = XLSX.SSF.parse_date_code(v);
    if(!d) return v;
    return `${d.y}-${String(d.m).padStart(2,'0')}-${String(d.d).padStart(2,'0')}`;
  }
  return v;
}

/* FILE LOAD */
document.getElementById("file").onchange=e=>{
  const reader=new FileReader();

  reader.onload=ev=>{
    const wb=XLSX.read(new Uint8Array(ev.target.result),{type:"array"});
    const sh=wb.Sheets[wb.SheetNames[0]];

    const json=XLSX.utils.sheet_to_json(sh,{
      defval:"",
      raw:false
    });

    raw=json.map(r=>{
      let clean={Product:"",Region:"",Date:"",Revenue:0};

      Object.keys(r).forEach(k=>{
        let key=k.trim().toLowerCase();

        if(key.includes("product")) clean.Product=r[k];
        if(key.includes("region")) clean.Region=r[k];
        if(key.includes("date")) clean.Date=fixDate(r[k]);
        if(key.includes("revenue")) clean.Revenue=Number(r[k])||0;
      });

      return clean;
    }).filter(r=>r.Product && r.Region && r.Date);

    render();
  };

  reader.readAsArrayBuffer(e.target.files[0]);
};

/* FILTER */
function setFilter(type,value){
  filters[type]=value;
  render();
}

function clearFilter(type){
  filters[type]=null;
  render();
}

/* GROUP SAFE */
function group(data,key){
  let map=new Map();

  data.forEach(r=>{
    let k=r[key];
    if(!k || k==="undefined") return;

    map.set(k,(map.get(k)||0)+r.Revenue);
  });

  return {
    labels:[...map.keys()],
    values:[...map.values()]
  };
}

/* RENDER */
function render(){

  let data=raw.filter(r=>{
    return (!filters.product||r.Product===filters.product)&&
           (!filters.region||r.Region===filters.region);
  });

  let rev=0,p={},r={},d={};

  data.forEach(x=>{
    let v=Number(x.Revenue)||0;
    rev+=v;

    if(x.Product) p[x.Product]=(p[x.Product]||0)+v;
    if(x.Region) r[x.Region]=(r[x.Region]||0)+v;
    if(x.Date) d[x.Date]=(d[x.Date]||0)+v;
  });

  let top=Object.keys(p).reduce((a,b)=>p[a]>p[b]?a:b,"-");

  document.getElementById("rev").innerText="$"+rev.toLocaleString();
  document.getElementById("ord").innerText=data.length;
  document.getElementById("top").innerText=safe(top);
  document.getElementById("avg").innerText="$"+(rev/(data.length||1)).toFixed(2);

  document.getElementById("insight").innerText=
    `Insight: ${safe(top)} leads revenue with $${rev.toLocaleString()}`;

  renderTable(data);
  renderCharts(p,r,d);
}

/* TABLE (FIXED undefined) */
function renderTable(data){
  document.getElementById("table").innerHTML=
    data.map(r=>`
      <tr>
        <td>${safe(r.Date)}</td>
        <td>${safe(r.Product)}</td>
        <td>${safe(r.Region)}</td>
        <td>${safe(r.Revenue)}</td>
      </tr>
    `).join("");
}

/* CHARTS */
function renderCharts(p,r,d){

  charts.forEach(c=>c.destroy());
  charts=[];

  const prod = group(p);
  const reg = group(r);
  const dat = group(d);

  charts.push(new Chart(c1,{
    type:"bar",
    data:{labels:prod.labels,datasets:[{data:prod.values}]},
    options:{responsive:true,maintainAspectRatio:false}
  }));

  charts.push(new Chart(c2,{
    type:"pie",
    data:{labels:reg.labels,datasets:[{data:reg.values}]},
    options:{responsive:true,maintainAspectRatio:false}
  }));

  charts.push(new Chart(c3,{
    type:"line",
    data:{labels:dat.labels,datasets:[{data:dat.values}]},
    options:{responsive:true,maintainAspectRatio:false}
  }));

  charts.push(new Chart(c4,{
    type:"bar",
    data:{labels:dat.labels,datasets:[{data:dat.values}]},
    options:{responsive:true,maintainAspectRatio:false}
  }));
}

</script>

</body>
</html>
