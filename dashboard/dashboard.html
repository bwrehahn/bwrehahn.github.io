<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Senior SaaS Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
:root{
  --bg:#0b1220;
  --card:#111c33;
  --text:#e5e7eb;
  --muted:#94a3b8;
}

body.light{
  --bg:#f4f6f8;
  --card:#ffffff;
  --text:#111;
  --muted:#555;
}

body{
  margin:0;
  font-family:Arial;
  background:var(--bg);
  color:var(--text);
}

.header{
  display:flex;
  justify-content:space-between;
  padding:15px;
  border-bottom:1px solid #1f2a44;
  align-items:center;
}

.actions{
  display:flex;
  gap:10px;
}

button{
  background:var(--card);
  color:var(--text);
  border:none;
  padding:6px 10px;
  border-radius:8px;
  cursor:pointer;
}

.grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:15px;
  padding:15px;
}

.box{
  background:var(--card);
  height:320px;
  border-radius:12px;
  padding:10px;
}

canvas{
  width:100%!important;
  height:100%!important;
}

table{
  width:calc(100% - 30px);
  margin:15px;
  background:var(--card);
  border-collapse:collapse;
}

td,th{
  padding:8px;
  border-bottom:1px solid #1f2a44;
  color:var(--text);
}
</style>
</head>

<body>

<div class="header">
  <b>Senior SaaS Dashboard</b>

  <div class="actions">
    <input type="file" id="file">
    <button onclick="toggleTheme()">Theme</button>
    <button onclick="exportCSV()">Export CSV</button>
  </div>
</div>

<div class="grid">
  <div class="box"><canvas id="c1"></canvas></div>
  <div class="box"><canvas id="c2"></canvas></div>
  <div class="box"><canvas id="c3"></canvas></div>
  <div class="box"><canvas id="c4"></canvas></div>
</div>

<table>
<thead>
<tr>
<th>Date</th><th>Product</th><th>Region</th><th>Revenue</th>
</tr>
</thead>
<tbody id="table"></tbody>
</table>

<script>

let raw=[];
let charts=[];

/* THEME */
function toggleTheme(){
  document.body.classList.toggle("light");
}

/* ✅ REAL EXCEL DATE FIX (IMPORTANT PART) */
function parseExcelDate(v){

  if(v === null || v === undefined) return null;

  // Excel serial number
  if(typeof v === "number"){
    const date = XLSX.SSF.parse_date_code(v);
    if(!date) return null;
    return `${date.y}-${String(date.m).padStart(2,'0')}-${String(date.d).padStart(2,'0')}`;
  }

  // already string
  let s = String(v).trim();

  if(!s || s.toLowerCase()==="undefined") return null;

  // try native parse fallback
  const d = new Date(s);
  if(!isNaN(d.getTime())){
    return d.toISOString().split("T")[0];
  }

  return s;
}

/* LOAD FILE */
document.getElementById('file').onchange=e=>{
  const reader=new FileReader();

  reader.onload=ev=>{
    const wb=XLSX.read(new Uint8Array(ev.target.result),{type:'array'});
    const sheet=wb.Sheets[wb.SheetNames[0]];

    raw=XLSX.utils.sheet_to_json(sheet,{defval:""}).map(r=>({
      Date: parseExcelDate(r.Date),
      Product: r.Product,
      Region: r.Region,
      Revenue: Number(r.Revenue)||0
    }));

    render();
  };

  reader.readAsArrayBuffer(e.target.files[0]);
};

/* RENDER */
function render(){

  let p={},r={},d={};

  raw.forEach(x=>{
    let v=x.Revenue||0;

    p[x.Product]=(p[x.Product]||0)+v;
    r[x.Region]=(r[x.Region]||0)+v;
    d[x.Date]=(d[x.Date]||0)+v;
  });

  renderTable();
  renderCharts(p,r,d);
}

/* TABLE */
function renderTable(){
  document.getElementById('table').innerHTML=
    raw.map(r=>`
      <tr>
        <td>${r.Date}</td>
        <td>${r.Product}</td>
        <td>${r.Region}</td>
        <td>${r.Revenue}</td>
      </tr>
    `).join('');
}

/* CHARTS */
function renderCharts(p,r,d){

  charts.forEach(c=>c.destroy());
  charts=[];

  charts.push(new Chart(c1,{
    type:'bar',
    data:{labels:Object.keys(p),datasets:[{data:Object.values(p)}]},
    options:{responsive:true,maintainAspectRatio:false}
  }));

  charts.push(new Chart(c2,{
    type:'pie',
    data:{labels:Object.keys(r),datasets:[{data:Object.values(r)}]},
    options:{responsive:true,maintainAspectRatio:false}
  }));

  /* ✅ FIXED TIME SERIES */
  const sorted = Object.keys(d).sort();

  charts.push(new Chart(c3,{
    type:'line',
    data:{
      labels: sorted,
      datasets:[{data: sorted.map(k=>d[k])}]
    },
    options:{responsive:true,maintainAspectRatio:false}
  }));

  charts.push(new Chart(c4,{
    type:'bar',
    data:{labels:Object.keys(d),datasets:[{data:Object.values(d)}]},
    options:{responsive:true,maintainAspectRatio:false}
  }));
}

/* EXPORT */
function exportCSV(){
  let csv="Date,Product,Region,Revenue\n";
  raw.forEach(r=>{
    csv+=`${r.Date},${r.Product},${r.Region},${r.Revenue}\n`;
  });
  const blob=new Blob([csv],{type:"text/csv"});
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download="data.csv";
  a.click();
}

</script>

</body>
</html>
