<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Senior SaaS Analytics Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
:root{
  --bg:#0b1220;
  --card:#111c33;
  --text:#e5e7eb;
  --muted:#94a3b8;
}

body.light{
  --bg:#f4f6f8;
  --card:#ffffff;
  --text:#111;
  --muted:#555;
}

body{
  margin:0;
  font-family:Arial;
  background:var(--bg);
  color:var(--text);
}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px;
  border-bottom:1px solid #1f2a44;
}

button{
  background:var(--card);
  color:var(--text);
  border:none;
  padding:6px 10px;
  border-radius:8px;
  cursor:pointer;
}

/* FILTER CHIPS */
.chips{
  display:flex;
  gap:8px;
  padding:10px 15px;
  flex-wrap:wrap;
}

.chip{
  background:var(--card);
  padding:6px 10px;
  border-radius:20px;
  font-size:12px;
  cursor:pointer;
}

/* KPI */
.kpis{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:10px;
  padding:15px;
}

.kpi{
  background:var(--card);
  padding:12px;
  border-radius:12px;
}

.kpi h4{
  margin:0;
  font-size:12px;
  color:var(--muted);
}

.kpi p{
  font-size:18px;
  margin:6px 0 0;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(2, minmax(0, 1fr));
  gap:15px;
  padding:15px;
}

.card{
  background:var(--card);
  border-radius:12px;
  padding:12px;
  height:320px;
}

/* FIXED CHART BEHAVIOR */
canvas{
  width:100% !important;
  height:100% !important;
}

/* TABLE */
table{
  width:calc(100% - 30px);
  margin:15px;
  border-collapse:collapse;
  background:var(--card);
  border-radius:12px;
  overflow:hidden;
}

td,th{
  padding:8px;
  border-bottom:1px solid #1f2a44;
}

th{
  color:var(--muted);
}
</style>
</head>

<body>

<div class="header">
  <div><b>Senior Analytics Dashboard</b></div>

  <div>
    <input type="file" id="file">
    <button onclick="toggleTheme()">🌙 Theme</button>
    <button onclick="exportCSV()">Export</button>
  </div>
</div>

<div class="chips" id="chips"></div>

<div class="kpis">
  <div class="kpi"><h4>Revenue</h4><p id="rev">$0</p></div>
  <div class="kpi"><h4>Orders</h4><p id="ord">0</p></div>
  <div class="kpi"><h4>Top Product</h4><p id="top">-</p></div>
  <div class="kpi"><h4>Avg Order</h4><p id="avg">$0</p></div>
</div>

<div class="grid">
  <div class="card"><canvas id="c1"></canvas></div>
  <div class="card"><canvas id="c2"></canvas></div>
  <div class="card"><canvas id="c3"></canvas></div>
  <div class="card"><canvas id="c4"></canvas></div>
</div>

<table>
<thead>
<tr>
<th>Date</th><th>Product</th><th>Region</th><th>Revenue</th>
</tr>
</thead>
<tbody id="table"></tbody>
</table>

<script>

let raw=[];
let charts=[];
let filters={product:null,region:null};

/* THEME */
function toggleTheme(){
  document.body.classList.toggle("light");
}

/* CLEAN EXCEL ROWS (FIXES UNDEFINED) */
function cleanRow(row){
  let clean={};

  Object.keys(row).forEach(k=>{
    let key=k.trim().toLowerCase();

    if(key.includes("product")) clean.Product=row[k];
    else if(key.includes("region")) clean.Region=row[k];
    else if(key.includes("date")) clean.Date=row[k];
    else if(key.includes("revenue")) clean.Revenue=row[k];
  });

  return clean;
}

/* FILE LOAD */
document.getElementById('file').addEventListener('change',e=>{
  let file=e.target.files[0];
  let reader=new FileReader();

  reader.onload=ev=>{
    let wb=XLSX.read(ev.target.result,{type:"binary"});
    let sheet=wb.Sheets[wb.SheetNames[0]];

    let json=XLSX.utils.sheet_to_json(sheet,{defval:""});

    raw=json.map(cleanRow).filter(r=>r.Product&&r.Region&&r.Date);

    render();
  };

  reader.readAsBinaryString(file);
});

/* FILTER */
function setFilter(type,val){
  filters[type]=val;
  render();
}

function clearFilters(){
  filters={product:null,region:null};
  render();
}

/* EXPORT */
function exportCSV(){
  let csv="Date,Product,Region,Revenue\n";
  raw.forEach(r=>{
    csv+=`${r.Date},${r.Product},${r.Region},${r.Revenue}\n`;
  });
  let blob=new Blob([csv],{type:"text/csv"});
  let a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download="export.csv";
  a.click();
}

/* RENDER */
function render(){

  let data=raw.filter(r=>{
    return (!filters.product||r.Product===filters.product)&&
           (!filters.region||r.Region===filters.region);
  });

  let rev=0,p={},r={},d={};

  data.forEach(x=>{
    let v=Number(x.Revenue)||0;
    rev+=v;

    p[x.Product]=(p[x.Product]||0)+v;
    r[x.Region]=(r[x.Region]||0)+v;
    d[x.Date]=(d[x.Date]||0)+v;
  });

  let top=Object.keys(p).reduce((a,b)=>p[a]>p[b]?a:b,"-");

  document.getElementById("rev").innerText="$"+rev.toLocaleString();
  document.getElementById("ord").innerText=data.length;
  document.getElementById("top").innerText=top;
  document.getElementById("avg").innerText="$"+(rev/(data.length||1)).toFixed(2);

  renderChips();
  renderTable(data);
  renderCharts(p,r,d);
}

/* CHIPS */
function renderChips(){
  let c=document.getElementById("chips");
  c.innerHTML="";

  if(filters.product)
    c.innerHTML+=`<div class="chip" onclick="setFilter('product',null)">Product: ${filters.product} ✕</div>`;

  if(filters.region)
    c.innerHTML+=`<div class="chip" onclick="setFilter('region',null)">Region: ${filters.region} ✕</div>`;
}

/* TABLE */
function renderTable(data){
  document.getElementById("table").innerHTML=
    data.map(r=>`
      <tr>
        <td>${r.Date}</td>
        <td>${r.Product}</td>
        <td>${r.Region}</td>
        <td>${r.Revenue}</td>
      </tr>
    `).join("");
}

/* CHARTS (SAFE + STABLE) */
function renderCharts(p,r,d){

  charts.forEach(c=>c.destroy());
  charts=[];

  charts.push(new Chart(c1,{
    type:"bar",
    data:{labels:Object.keys(p),datasets:[{data:Object.values(p)}]},
    options:{
      responsive:true,
      maintainAspectRatio:false,
      onClick:(e,i)=>{
        if(i.length)setFilter("product",Object.keys(p)[i[0].index]);
      }
    }
  }));

  charts.push(new Chart(c2,{
    type:"pie",
    data:{labels:Object.keys(r),datasets:[{data:Object.values(r)}]},
    options:{
      responsive:true,
      maintainAspectRatio:false,
      onClick:(e,i)=>{
        if(i.length)setFilter("region",Object.keys(r)[i[0].index]);
      }
    }
  }));

  charts.push(new Chart(c3,{
    type:"line",
    data:{labels:Object.keys(d),datasets:[{data:Object.values(d)}]},
    options:{responsive:true,maintainAspectRatio:false}
  }));

  charts.push(new Chart(c4,{
    type:"bar",
    data:{labels:Object.keys(d),datasets:[{data:Object.values(d)}]},
    options:{responsive:true,maintainAspectRatio:false}
  }));
}

</script>

</body>
</html>
