<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inquiry | Gold-Leaf Investments</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="sub-hero">
        <h1>Private Inquiry</h1>
        <p>Bespoke wealth management starts with a conversation.</p>
    </header>

    <div class="container" style="max-width: 600px;">
        <div class="card">
            <h3>Consultation Request</h3>
            <p style="font-size: 0.9rem; color: #aaa;">Please provide your professional details. A senior advisor will reach out within 24 hours.</p>
            <form style="display: flex; flex-direction: column; gap: 15px; margin-top: 20px;">
                <input type="text" placeholder="Full Name" required style="padding: 1rem; background: var(--black); border: 1px solid #444; color: white;">
                <input type="email" placeholder="Email Address" required style="padding: 1rem; background: var(--black); border: 1px solid #444; color: white;">
                <select style="padding: 1rem; background: var(--black); border: 1px solid #444; color: #888;">
                    <option>Investment Portfolio Size</option>
                    <option>$1M - $5M</option>
                    <option>$5M - $20M</option>
                    <option>$20M+</option>
                </select>
                <textarea rows="5" placeholder="Primary Financial Goals" style="padding: 1rem; background: var(--black); border: 1px solid #444; color: white;"></textarea>
                <button type="submit" class="cta-button" style="border:none; cursor:pointer;">Request Briefing</button>
            </form>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 Gold-Leaf Investments. All Rights Reserved.</p>
    </footer>
</body>
</html>
